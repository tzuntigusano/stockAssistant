name: CI

# Lint + tests en cada push y pull request. Todo local/gratuito, sin secretos:
# los tests cubren el core determinista (no hacen llamadas de red ni usan claves).

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Instala dependencias (app + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        run: pytest

  frontend:
    name: Frontend (typecheck + prettier)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instala dependencias
        run: npm ci

      - name: Typecheck (tsc)
        run: npm run typecheck

      - name: Formato (prettier)
        run: npm run format:check
